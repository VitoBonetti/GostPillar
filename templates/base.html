{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GOST Pillar - {% block title %} {% endblock title %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
        {% block custom_script %}{% endblock custom_script %}
    </head>
    <body>
        <div class="container-fluid">
            {% include 'navbar.html' %}

            {% block content %} {% endblock content %}
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                // Find all alerts on the page
                const alerts = document.querySelectorAll('.alert');

                alerts.forEach(function(alertElement) {
                    // Only auto-dismiss success and info messages (keep errors visible until manually closed)
                    if(alertElement.classList.contains('alert-success') || alertElement.classList.contains('alert-info')) {
                        setTimeout(function() {
                            // Use Bootstrap's native alert dismissal for a smooth fade out
                            const bsAlert = new bootstrap.Alert(alertElement);
                            bsAlert.close();
                        }, 4000); // 4000 milliseconds = 4 seconds
                    }
                });
            });
        </script>
        {% block custom_bottom_script %}
        {% endblock custom_bottom_script %}
    </body>
</html>
